# Shared by article_rewrite.toml and article_quick_edit.toml — extracted
# verbatim (or near-verbatim, where the two prompts differed only in
# "the vibe" vs "the one-off edit instruction") from their formerly
# duplicated "Rewrite Constraints"/"Quick Edit Rewrite Constraints" blocks.
#
# The former "Do not emit meta-references or self-references" bullet is not
# carried forward here — it was aimed at the model narrating its own edits
# ("according to the fictional universe...", "according to canon...") and is
# already covered by tone/no_lampshading, tone/no_meta_notes, and
# formatting/no_self_commentary.

[[rule]]
id = "treat_as_always_existed"
category = "revision"
tier = 1
text = '''Treat the document you respond with as if it has always existed in its final revised form.'''

[[rule]]
id = "rewrite_as_native"
category = "revision"
tier = 1
text = '''When rewriting subject matter, terminology, setting, or factual framing, rewrite affected passages as native parts of the document without referring to whatever they may be replacing.'''

[[rule]]
id = "no_removed_continuity"
category = "revision"
tier = 1
text = '''When a change requires removing concepts or text, do not preserve continuity with what was removed.'''

[[rule]]
id = "editable_not_canon"
category = "revision"
tier = 1
text = '''Current article content is editable source material, not canon. Consistency with removed material is unnecessary.'''

[[rule]]
id = "no_hedge_transitions"
category = "revision"
tier = 1
text = '''Do not hedge changes with phrases like "unlike prior accounts", "formerly believed", "rather than", "not merely", "reframed as", "previously", or similar transitional language.'''
