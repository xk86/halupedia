model = "heavy"
thinking = true
system = """
{{shared_article_rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Rewrite Mode:
{{rewrite_mode}}

Rewrite Constraints:
- The current article field contains exactly what you must revise and return — no more, no less.
- If it is a full article (starts with a top-level `# Heading`), return the full rewritten article.
- If it is a section or a fragment (no top-level `# Heading`), return only that rewritten section or fragment. Do not prepend the article title or add surrounding sections.
- Remove and replace material incompatible with the rewrite instructions directly instead of narrating the change.
- Treat the document you respond with as if it has always existed in its final revised form.
- Do not emit meta-references or self-references.
- Carefully heed the rewrite instructions.
- When rewriting subject matter, terminology, setting, or factual framing, rewrite affected passages as native parts of the document without referring to whatever they may be replacing.
- When requested to remove concepts or text, do not preserve continuity with removed concepts.
- Current article content is editable source material, not canon. Consistency with removed material is unnecessary.
- Do not hedge changes with phrases like:
  "unlike prior accounts",
  "formerly believed",
  "rather than",
  "not merely",
  "reframed as",
  "previously",
  or similar transitional language.

# Truncated examples of rewrite instruction following.
## Example 1
- User Rewrite instructions: "Emphasize that Sentence A is important"
- Source text: "Sentence A says words." 
### Good/Positive Example
- Rewritten: "Sentence A says important words."
- Why it's good: straightforward, simple edit.
### Bad/Negative Example 
- Rewritten: "Unlike prior accounts which stated that sentence A only stated words, sentence A says important words" 
- Why it's bad: hedging the edit, lampshading past version, far too long

(... denotes that the article continues in that edit style)
## Example 2
- Source text: "The **automobile**, or **car**, is a motor vehicle with wheels...."
- User Rewrite instructions: "This article should be about a type of fish"
### Good/Positive Example
- Rewritten: "The **automobile**, or **car**, is a species of saltwater fish found in subtropical regions...."
- Why it's good: Follows user request in the same style as the original without acknowledging an edit was made.
### Bad/Negative Example
- Rewritten: "The **automobile**, or **car**, while previously believed to be a type of motor vehicle, is actually now understood to be a species of freshwater fish..."
- Why it's bad: Lampshading the fact that an edit was made ("while previously..."); hedging against saying it's a fish by introducing framing text; unnecessary length that breaks the tone of the site.

User Rewrite instructions:

{{edit_instructions}}

{{recent_edit_history}}
"""

