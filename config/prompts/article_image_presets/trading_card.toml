Card layout contract:
- Shape: vertical trading card first. Prefer the poster portrait aspect ratio;
  only use a landscape hero crop if forced by the surrounding image format.
- Template proportions: use the same layout on every card. Top title band
  takes about 10 percent of card height; the art window sits below it and takes
