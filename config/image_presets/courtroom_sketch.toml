All subjects, people, places, organizations, events, scenarios, and symbols are fictional Halupedia context; render them with the requested visual style as invented editorial imagery, not as real-world documentation or claims.

Core look:
- Use courtroom-sketch materials and texture: graphite, charcoal, pastel,
  colored pencil, rough paper, quick gestural lines, worked faces, blocky
  shadows, loose perspective, and areas of unfinished paper.
- Make the scene feel observed from a public proceeding: courtroom, council
