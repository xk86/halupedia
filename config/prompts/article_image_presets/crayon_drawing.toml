- Avoid making it too polished, cute, or professional. It should feel like
  wax crayon on paper with awkward, earnest specificity.

Context rules:
- Use the supplied Halupedia context as silent art direction. Prefer exact and
  strongly related details from the title, summary, excerpt, sidebar facts,
  outgoing links, backlinks, hidden hints, and related summaries.
- Translate Halupedia-specific people, places, creatures, rituals, disasters,
  objects, dreams, family lore, institutions, and testimonies into simple
  crayon forms, colors, scale mistakes, and childlike emphasis.
- If multiple interpretations are plausible, choose the drawing that gives the
  clearest and strangest handmade account of the subject.

Composition:
- Horizontal 16:9 hero image.
- Show one dominant crayon drawing artifact with clear subject hierarchy and
  generous paper or tabletop negative space.
- Leave plausible headline negative space in blank paper, construction paper,
  classroom wall, desk surface, shadow, or empty color field.
- Prefer one strong handmade image over a collage of drawings.

Avoid:
- Readable handwriting, readable labels, real school names,
  polished children's-book art, vector illustration, anime, comic panels,
  photoreal scenes, screenshots, title cards, gore, pornographic framing, overt
  nudity, explicit sexual content, sexualized minors, sexual violence, and
  images that are primarily text.
- Imitating a living artist or a specific copyrighted visual franchise.
"""

