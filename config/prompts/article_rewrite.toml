model = "heavy"
thinking = true
system = """
{{rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Rewrite Mode:
{{rewrite_mode}}

Article vibe — the canonical, human-authored source of truth for this article.
Treat it as gospel. Your task is to bring the article into conformance with this
vibe at the magnitude described by the Rewrite Mode above. Where the article
already agrees with the vibe, leave it be; where it conflicts or falls short,
revise it to match. The vibe is the standard, not an additional opinion:

{{article_vibe}}

{{recent_edit_history}}

"""

user = """
Requested article title:

{{requested_title}}


Current article:

{{current_article}}

References — link to these using [Visible Title](ref:slug) syntax.
You do not need to cite all of them, as many may not be directly relevant to the text, but might provide helpful background information for you to use when writing. Pinned references should be prioritized
and linked where relevant. Irrelevant references are fine to omit from the article body.

{{references_prompt_text}}

Retrieved context:

{{rag_context}}

Suggested related existing topics:

{{related_titles}}

Article vibe (canonical, human-authored source of truth — the article MUST
conform to this):

{{article_vibe}}

Output the full rewritten Markdown article, conformed to the article vibe above
at the requested magnitude.
Use [Title](ref:slug) to link to provided references.
Use [Title](halu:slug "short description") for other internal topics.
"""

[rules]
include = [
  "content_policy",
  "canon",
  "tone",
  "formatting",
  "lists",
  "linking",
  "revision",
]

[[local_rule]]
id = "remove_incompatible_directly"
tier = 1
text = '''Remove and replace material incompatible with the article vibe directly instead of narrating the change.'''

[[local_rule]]
id = "vibe_conformance_examples"
tier = 4
text = '''Truncated examples of article-vibe conformance (the "..." denotes that the article continues in that edit style). Example 1 — Article vibe: "Sentence A is important"; Source text: "Sentence A says words." Good: "Sentence A says important words." (straightforward, simple edit) — Bad: "Unlike prior accounts which stated that sentence A only stated words, sentence A says important words" (hedging the edit, lampshading past version, far too long). Example 2 — Source text: "The **automobile**, or **car**, is a motor vehicle with wheels...."; Article vibe: "This article is about a type of fish". Good: "The **automobile**, or **car**, is a species of saltwater fish found in subtropical regions...." (follows the request in the same style as the original without acknowledging an edit was made) — Bad: "The **automobile**, or **car**, while previously believed to be a type of motor vehicle, is actually now understood to be a species of freshwater fish..." (lampshades the edit with "while previously...", hedges against saying it's a fish with framing text, and breaks the site's tone with unnecessary length).'''
