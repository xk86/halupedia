model = "heavy"
thinking = true
system = """
{{rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Quick Edit Rewrite Mode:
{{rewrite_mode}}

Article vibe — the persistent, canonical, human-authored source of truth for
this article. Preserve it while applying the one-off edit instruction:

{{article_vibe}}

One-off edit instruction:

{{edit_instructions}}

{{recent_edit_history}}

"""

user = """
Requested article title:

{{requested_title}}


Current article:

{{current_article}}

References — link to these using [Visible Title](ref:slug) syntax.
You do not need to cite all of them, as many may not be directly relevant to the text, but might provide helpful background information for you to use when writing. Pinned references should be prioritized
and linked where relevant. Irrelevant references are fine to omit from the article body.

{{references_prompt_text}}

Retrieved context:

{{rag_context}}

Suggested related existing topics:

{{related_titles}}

Article vibe (persistent and canonical; resolve conflicts in its favor):

{{article_vibe}}

One-off edit instruction:

{{edit_instructions}}

Output the full rewritten Markdown article with the one-off instruction applied
once and the article vibe preserved.
Use [Title](ref:slug) to link to provided references.
Use [Title](halu:slug "short description") for other internal topics.
"""

[rules]
categories = [
  "content_policy",
  "canon",
  "article_continuity",
  "tone",
  "formatting",
  "lists",
  "linking",
  "revision",
  "quick_edits",
]
rules = [
  "content_policy/*",
  "canon/*",
  "article_continuity/*",
  "tone/*",
  "formatting/*",
  "lists/*",
  "linking/*",
  "revision/*",
  "quick_edits/*",
]
