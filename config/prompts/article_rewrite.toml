{{requested_title}}

Rewrite instructions:

{{edit_instructions}}

Current article:

{{current_article}}

Available references (link back with [anchor text](ref:slug-name) — the "reflink" field gives you the ready-made link syntax; "content" is a summary or excerpt you can draw facts from; pinned entries must appear in the article):

{{references_json}}

Retrieved context:

{{rag_context}}

Suggested related existing topics:

{{related_titles}}

Output format — use these two markers, no other text:

---body
---used-refs

After ---body: the full rewritten Markdown article, starting with # heading.
After ---used-refs: a JSON array of ref slugs you used, e.g. ["slug-a","slug-b"], or [].
Pinned references (pinned: true) MUST appear in ---body links and in ---used-refs.
Use double-quoted halu hints inside the article, e.g. `[Title](halu:slug "hint")`."""
