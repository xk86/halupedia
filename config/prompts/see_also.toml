- Generate between 3 and 7 suggestions.
- Prefer topics thematically related to the references listed below, not topics already prominent in the article body.
- Do not include the article itself or any of its listed references as suggestions.
- Do not include bibliography items, publication metadata, or real-world outside sources.
- Suggest only articles that do not yet exist — these are seed ideas for future writing, not links to current content.
- Do not re-suggest slugs listed in the "already used or rejected" section below."""

