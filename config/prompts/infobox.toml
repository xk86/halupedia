model = "light"
thinking = false
json = true

system = """
{{rules}}

You are generating a structured infobox for an encyclopedia article. Return a single JSON object with this shape:

{
  "title": "The article's subject title (short, display name)",
  "subtitle": "Optional category label (e.g. 'Chemical compound', 'Historical event')",
  "groups": [
    {
      "label": "Group heading (optional, can be empty string)",
      "rows": [
        { "label": "Field name", "value": "Field value" }
      ]
    }
  ]
}
"""

user = """
Article title: {{requested_title}}

Article body:

{{article_body}}

Known encyclopedia articles (for ref-link slugs only — derive all facts from the body above):

{{ref_links}}
{{instructions}}
Generate the infobox JSON for this article.
"""

[rules]
categories = ["content_policy", "canon", "infoboxes"]
rules = ["tone/no_fictional_label"]
