name = "hallupedia"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

[[routes]]
pattern = "hallupedia.com"
custom_domain = true

[[routes]]
pattern = "www.hallupedia.com"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "ARTICLES"
id = "90bb9e8b977a4915bcbc10586f83a5ce"
preview_id = "722fb41fc7af44f6bf6210a884025781"

# Comments + ephemeral users live in D1 (Cloudflare's free SQLite).
# One-time setup:
#   pnpm wrangler d1 create hallupedia
# then paste the returned database_id below and run:
#   pnpm wrangler d1 migrations apply hallupedia --remote
#   pnpm wrangler d1 migrations apply hallupedia --local
[[d1_databases]]
binding = "DB"
database_name = "hallupedia"
database_id = "7e6d3ae5-a12a-4aaf-9e79-a4bb5c53616a"
migrations_dir = "migrations"

[vars]
OPENROUTER_MODEL = "google/gemini-2.5-flash-lite"
MAX_ARTICLES_PER_DAY = "5000"
# Per-IP guards against UA-spoofing scrapers. Bypassable via IP rotation,
# but the global daily cap above is the hard backstop.
GEN_PER_IP_PER_HOUR = "100"
IDENT_PER_IP_PER_HOUR = "10"

# OPENROUTER_API_KEY should be set as a secret:
# pnpm wrangler secret put OPENROUTER_API_KEY
