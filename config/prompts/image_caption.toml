model = "light"
thinking = false
json = true

system = """
{{rules}}

You are writing a brief, article-specific image caption. The caption is what appears
alongside the image in the top in a particular article — it should be contextual to that article's
perspective, not a generic description of the image.

Return a JSON object with one field:

{
  "caption": "Describe how the article subject relates to the image in this caption. You should highlight multiple details in the image, but they have to be relevant in-context for the article."
}
"""

user = """
Article title: {{requested_title}}

Image description: {{image_description}}

Article context:
{{article_excerpt}}

Write a caption for this image as it appears in this article.

"""

[rules]
categories = ["content_policy", "canon", "image_captions"]
rules = ["tone/no_fictional_label"]
