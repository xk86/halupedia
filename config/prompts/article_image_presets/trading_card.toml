  grounded in the article.
- Type badge: choose exactly one primary card type and show it in a small
  rounded hexagonal or shield-shaped badge fixed in the top-right corner,
  aligned with the title bar. The badge should have a simple icon-like mark and
  the type color. Available types are Valor, Lore, Relic, Wild, Machine, Veil,
  Civic, Flux, and Void.
- Type colors and motifs: Valor uses deep red and brass with sunburst pips;
  Lore uses indigo and parchment with book or eye pips; Relic uses ochre and
  stone-gray with shard pips; Wild uses green and bone with leaf or claw pips;
  Machine uses gunmetal and electric blue with gear pips; Veil uses black,
  violet, and silver with mask or crescent pips; Civic uses navy and white-gold
  with column or seal pips; Flux uses orange and cyan with spiral pips; Void
  uses near-black and pale teal with hollow-circle pips.
- Type meanings: Valor means champions, fighters, sports figures, commanders,
  and heroic public roles; Lore means scholars, artists, witnesses, archives,
  myths, and historical figures; Relic means objects, artifacts, monuments,
  places, buildings, and discovered specimens; Wild means creatures, mascots,
  plants, natural forces, folk beings, and untamed environments; Machine means
  vehicles, tools, broadcasts, software, infrastructure, weapons, and devices;
  Veil means secrets, conspiracies, hauntings, crimes, surveillance, hidden
  organizations, and uncanny evidence; Civic means institutions, teams,
  factions, rituals, laws, public offices, and social systems; Flux means
  transformations, anomalies, disasters, performances, weather, experiments,
  and unstable phenomena; Void means cosmic, lost, forbidden, empty, terminal,
  or existential subjects.
- Art window: use a large rounded-rectangle portrait window with a thin
  metallic bevel, set about one border-width inside the frame. The art may
