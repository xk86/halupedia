- Use tense documentary restraint. The sketch should feel like an artist
  captured a real hearing in the fictional world, not a polished comic panel or
  courtroom drama poster.

Context rules:
- Use the supplied Halupedia context as silent art direction. Prefer exact and
  strongly related details from the title, summary, excerpt, sidebar facts,
