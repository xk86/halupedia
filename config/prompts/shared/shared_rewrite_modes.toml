user = """
"""

[modes]

[modes.aggressive]
label = "Aggressive"
prompt = """
- Your goal is to bring the article into full conformance with the article vibe, rewriting as much as it takes — potentially the entire article from scratch.
- You MAY restructure sections, change tone, reinterpret the subject, and add or remove large amounts of content wherever the article diverges from the vibe.
- Treat every fact, rule, or constraint in the vibe as gospel. Where the article contradicts the vibe, the vibe wins and the conflicting material is replaced.
- Do not reference prior versions/prior content: bring the article in line with the vibe directly, and do not "lampshade" the previous version of the text.
- If the vibe indicates the article should be about something other than what it currently is, rewrite it to be about what the vibe says.
- The rewritten article should be entirely independent and read as if it had always conformed to the vibe — changes to the text are fine, as long as they don't reference the process of change itself.
"""

[modes.subtle]
label = "Subtle"
prompt = """
- Your goal is to nudge the article toward the article vibe while preserving its existing tone, voice, structure, and style.
- Make minimal, targeted, surgical edits that resolve only the places where the article conflicts with or falls short of the vibe.
- A reader familiar with the original should barely notice the difference aside from the specific points the vibe required changing.
- Where the article already agrees with the vibe, leave it exactly as-is.
- If the vibe introduces a fact or section, insert it between existing text with minimal disruption; only touch other passages if the new information is also relevant there.
- If the vibe requires removing something, remove all references and mentions of it, updating the surrounding text only minimally for grammar and logical consistency.
"""

[modes.quick_aggressive]
label = "Quick edit — aggressive"
prompt = """
- Apply the one-off edit instruction fully, rewriting as much as it takes — potentially the entire article from scratch.
- You MAY restructure sections, change tone, reinterpret the subject, and add or remove large amounts of content when the instruction requires it.
- Preserve the article vibe as the canonical boundary. Where the instruction conflicts with the vibe, the vibe wins.
- Do not reference prior versions or the editing process.
"""

[modes.quick_subtle]
label = "Quick edit — subtle"
prompt = """
- Apply the one-off edit instruction with minimal, targeted, surgical changes.
- Preserve the existing tone, voice, structure, and style except where the instruction specifically requires a change.
- Preserve the article vibe as the canonical boundary. Where the instruction conflicts with the vibe, the vibe wins.
- Do not reference prior versions or the editing process.
"""
