[modes]

[modes.aggressive]
label = "Aggressive"
prompt = """
You have expanded, but not full creative license. 
You MAY (OPTIONALLY, and ONLY WHEN ACCORDING TO EDIT INSTRUCTIONS) restructure sections, change tone, reinterpret the subject, add or remove content, and potentially even rewrite from scratch, but only if requested by the user.
Do not reference prior versions: if you are making corrections that the user has instructed you to, simply do the instructions, and do not attempt to "lampshade" prior version(s) of the text.
"""

[modes.subtle]
label = "Subtle"
prompt = """
Preserve the existing tone, voice, structure, and style. 
Make targeted, surgical edits that address the rewrite instructions without changing the article's character. A reader familiar with the original should barely notice the difference aside from the specific requested changes. 
Be sure to still include changes requested by the user - this is very important!
If you're asked to include a section, you may insert it between existing text only. Only modify other text if the information you are adding here is also relevant there.
"""
