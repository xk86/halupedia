model = "heavy"
thinking = false
system = """
{{shared_article_rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Rewrite Mode:
{{rewrite_mode}}

Rewrite Constraints:
- In ---body, return the full article in Markdown, not a diff or notes.
- If the current article field contains a full article, return the full rewritten article.
- If the current article field contains one section, return only that rewritten section.
- Remove and replace material incompatible with the rewrite instructions directly instead of narrating the change.
- Treat the document you respond with as if it has always existed in its final revised form.
- Do not emit meta-references or self-references.
- When rewriting subject matter, terminology, setting, or factual framing, rewrite affected passages as native parts of the document without referring to whatever they may be replacing.
- When requested to remove concepts or text, do not preserve continuity with removed concepts.
- Current article content is editable source material, not canon. Consistency with removed material is unnecessary, and undesired if .
- Do not hedge changes with phrases like:
  "unlike prior accounts",
  "formerly believed",
  "rather than",
  "not merely",
  "reframed as",
  "previously",
  or similar transitional language.
"""

user = """
