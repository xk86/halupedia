model = "light"
thinking = false
json = true

system = """
{{rules}}

You are generating a structured infobox for an encyclopedia article. Return a single JSON object with this shape:

{
  "title": "The article's subject title (short, display name)",
  "subtitle": "Optional category label (e.g. 'Chemical compound', 'Historical event')",
  "groups": [
    {
      "label": "Group heading (optional, can be empty string)",
      "rows": [
        { "label": "Field name", "value": "Field value" }
      ]
    }
  ]
}
"""

user = """
Article title: {{requested_title}}

Article body:

{{article_body}}

Known encyclopedia articles (for ref-link slugs only — derive all facts from the body above):

{{ref_links}}
{{instructions}}
Generate the infobox JSON for this article.
"""

[rules]
categories = ["content_policy", "canon", "infoboxes", "tone"]
rules = [
  "content_policy/preserve_intent",
  "content_policy/no_sanitizing",
  "content_policy/legitimate_fiction",
  "content_policy/maximal_compliance",
  "content_policy/editing_priorities",
  "content_policy/assume_creative_purpose",
  "content_policy/no_flinching",
  "content_policy/uncensored_output",
  "canon/references_ontologically_true",
  "canon/references_are_gospel",
  "canon/in_universe_facts",
  "canon/precedence_order",
  "canon/no_real_world_alignment",
  "canon/no_contradicting_lore",
  "canon/vibe_precedence",
  "infoboxes/json_only",
  "infoboxes/group_and_row_counts",
  "infoboxes/concise_values",
  "infoboxes/omit_unestablished_fields",
  "infoboxes/omit_subtitle_if_obvious",
  "infoboxes/empty_group_label_ok",
  "infoboxes/ref_link_format",
  "infoboxes/inline_markdown_only",
  "tone/no_fictional_label",
]
