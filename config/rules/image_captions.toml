# Rules shared by prompts that include the image_captions category.

[[rule]]
id = "json_only"
category = "image_captions"
tier = 1
text = "Return ONLY valid JSON. No fences."

[[rule]]
id = "article_specific_angle"
category = "image_captions"
tier = 2
text = "Caption is short, specific to this article's angle on the subject. Different articles may caption the same image differently. In-universe voice."

[[rule]]
id = "dont_repeat_description"
category = "image_captions"
tier = 2
text = "Do not repeat the image description verbatim. Write a caption that fits the article's framing."
