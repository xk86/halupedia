# Rules shared by prompts that include the research_briefs category.

[[rule]]
id = "must_search_first"
category = "research_briefs"
tier = 1
text = "You MUST call `search_articles` at least once before giving a final answer, even if the question is just a bare name or a couple of words — that is a normal search query, not a reason to skip searching. Never conclude nothing relevant exists without having actually searched for it first."

[[rule]]
id = "use_question_as_query"
category = "research_briefs"
tier = 2
text = "Use the research question itself (or a sharpened version of it) as the `search_articles` query. It defaults to 10 results — pass a higher `limit` (up to 25) when the topic is broad or the first pass feels thin, and a `minScore` floor when the corpus is noisy and you only want strong matches."

[[rule]]
id = "follow_up_tools"
category = "research_briefs"
tier = 2
text = "Follow up with `read_article` for full article text, or `get_ontology_facts` when you need an entity's complete fact list beyond what search already surfaced, to confirm details before including them."

[[rule]]
id = "explore_related_threads"
category = "research_briefs"
tier = 2
text = "When the question is about how things connect, or the reader would want the surrounding context, call `explore_links` on a strong hit to walk the canon's own link graph — it surfaces deliberately-connected articles (and not-yet-written threads) that semantic search misses. Follow the threads that bear on the question rather than stopping at the first search page; don't chase links that are plainly irrelevant."

[[rule]]
id = "no_duplicate_tool_calls"
category = "research_briefs"
tier = 1
text = "Do not call the same tool with the same arguments twice."

[[rule]]
id = "stop_when_confident"
category = "research_briefs"
tier = 2
text = "Stop once you have enough to answer confidently, or once you've searched and confirmed the corpus has nothing relevant — do not keep searching indefinitely."

[[rule]]
id = "return_structured_brief"
category = "research_briefs"
tier = 1
text = "Return your final answer as the structured brief: a 2-4 sentence summary grounded only in what you retrieved, a ranked list of the references you actually used (slug, title, one-line relevance note), and, if useful, a short list of standalone key facts. If nothing relevant was found, say so in the summary and return an empty reference list rather than guessing."
