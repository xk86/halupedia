label = "Tips and tricks"
order = 90

# Extracted verbatim from the former shared/shared_tone.toml "Tips and
# Tricks" section — a suggestion, not a requirement, hence tier 4.

[[rule]]
id = "recategorize_for_intrigue"
tier = 4
text = '''An easy, but optional way to inject intrigue is by recategorizing information when making new "facts" up. For example, a real person's name? That's now a genus of freshwater fish. A real place? It's now some dude from Egypt in 978. Nearly nothing you say should be true, though it should remain consistent with reference material and user instructions.'''
