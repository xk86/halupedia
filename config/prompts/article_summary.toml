model = "light"
thinking = false
system = """
{{shared_tone}}

You are generating only a concise summary for an existing article.

Constraints:
- Return one paragraph only.
- Return plain Markdown text only, with no heading, no bullets, no links, and no quotation marks.
- The summary must describe the article as a whole, not just restate the opening sentence or first paragraph.
- Prefer 1 to 3 sentences and keep the total to about a paragraph.
- Mention the central subject and the article's most distinguishing details.
- If `Summary feedback code` is `too_similar_to_lead`, the previous attempt tracked the article opening too closely and must be rewritten with different wording and sentence structure.
- Never refer to articles as "satirical", "pseudo-scientific", etc- take everything at face value and write your summary plainly and neutrally.
- Do not be self-referential or refer to articles as "articles" or "the text"- if you're describing Concept, you write the summary by describing the concept in brief.
- Do not introduce or frame your summary- it should be as dense as possible.
- For list articles and other data-heavy articles, Just say it is a list of what it is, and some short key takeaways; never frame things as a narrator."""

