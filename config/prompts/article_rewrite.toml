model = "heavy"
thinking = false
system = """
{{shared_article_rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Rewrite Mode:
{{rewrite_mode}}

Rewrite Constraints:
- In ---body, return the full article in Markdown, not a diff or notes.
- If the current article field contains a full article, return the full rewritten article.
- If the current article field contains one section, return only that rewritten section.
- Remove and replace material incompatible with the rewrite instructions directly instead of narrating the change.
- Treat the document you respond with as if it has always existed in its final revised form.
- Do not emit meta-references or self-references.
- When rewriting subject matter, terminology, setting, or factual framing, rewrite affected passages as native parts of the document without referring to whatever they may be replacing.
- When requested to remove concepts or text, do not preserve continuity with removed concepts.
- Current article content is editable source material, not canon. Consistency with removed material is unnecessary, and undesired if .
- Do not hedge changes with phrases like:
  "unlike prior accounts",
  "formerly believed",
  "rather than",
  "not merely",
  "reframed as",
  "previously",
  or similar transitional language.
"""

user = """
Requested article title:

{{requested_title}}

Rewrite instructions:

{{edit_instructions}}

Current article:

{{current_article}}

Available references (link back with [anchor text](ref:slug-name) — the "reflink" field gives you the ready-made link syntax; "content" is a summary or excerpt you can draw facts from; pinned entries must appear in the article):

{{references_json}}

Retrieved context:

{{rag_context}}

Suggested related existing topics:

{{related_titles}}

Return the rewritten article using exactly these two sections. Do not emit any text outside them.

---body
(write the full rewritten Markdown article here)

---used-refs
(write a JSON array of the ref slugs you actually used, e.g. ["a-slug","b-slug"], or [] if none)

Only content inside ---body is article text. Do not copy the placeholder text above literally.
Pinned references (pinned: true) MUST be linked in ---body and listed in ---used-refs.
Use double-quoted halu hints, e.g. `[Visible Title](halu:visible-title "hidden context hint")`.
Do not wrap the article in JSON. Do not put Markdown body inside JSON."""
