name = "hallupedia"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

[[routes]]
pattern = "halupedia.com"
custom_domain = true

[[routes]]
pattern = "www.halupedia.com"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "ARTICLES"
id = "90bb9e8b977a4915bcbc10586f83a5ce"
preview_id = "722fb41fc7af44f6bf6210a884025781"

# Comments + ephemeral users live in D1 (Cloudflare's free SQLite).
# One-time setup:
#   pnpm wrangler d1 create hallupedia
# then paste the returned database_id below and run:
#   pnpm wrangler d1 migrations apply hallupedia --remote
#   pnpm wrangler d1 migrations apply hallupedia --local
[[d1_databases]]
binding = "DB"
database_name = "hallupedia"
database_id = "7e6d3ae5-a12a-4aaf-9e79-a4bb5c53616a"
migrations_dir = "migrations"

[vars]
OPENROUTER_MODEL = "google/gemini-2.5-flash-lite"
MAX_ARTICLES_PER_DAY = "5000"
# Per-IP guards against UA-spoofing scrapers. Bypassable via IP rotation,
# but the global daily cap above is the hard backstop.
GEN_PER_IP_PER_HOUR = "100"
IDENT_PER_IP_PER_HOUR = "10"
SEARCH_PER_IP_PER_HOUR = "15"

# --- Cloudflare Turnstile bot gating ---------------------------------------
# Activates ONLY when all three secrets below are set. With them missing,
# every gated request falls through (no captcha, no challenge), which is
# what local dev wants.
#
# Setup:
#   1. Create a Turnstile site at https://dash.cloudflare.com → Turnstile.
#      Use Widget mode "Managed". Add halupedia.com to the hostname list.
#   2. Replace the placeholder TURNSTILE_SITE_KEY below with the public key.
#   3. Set the matching secret + a fresh 32-byte HMAC secret:
#        pnpm wrangler secret put TURNSTILE_SECRET_KEY
#        openssl rand -hex 32 | pnpm wrangler secret put TURNSTILE_TRUST_SECRET
#   4. For local dev, mirror those into .dev.vars.
#
# Tunables (both optional, sane defaults baked into the worker):
#   TURNSTILE_TRUST_TTL_SEC   how long a single successful challenge buys
#                             the visitor passage on every gated endpoint
#                             (default 1800 = 30 min)
#   TURNSTILE_RISKY_RATIO     fraction of the per-IP hourly rate-limit
#                             after which the gate demands a challenge
#                             (default 0.5 = 50 %)
TURNSTILE_SITE_KEY = "0x4AAAAAADQkoxTIvDC4I2RB"
# TURNSTILE_TRUST_TTL_SEC = "1800"
# TURNSTILE_RISKY_RATIO = "0.5"

# OPENROUTER_API_KEY should be set as a secret:
# pnpm wrangler secret put OPENROUTER_API_KEY

# Live presence (who is reading what, in real time). Single global DO,
# WebSocket-only API at /api/presence. SQLite-backed (the modern default).
[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PresenceDO"]
