model = "heavy"
thinking = true
system = """
{{rules}}

Incoming canonical references that may link back to this article:

{{link_hints}}

Rewrite Mode:
{{rewrite_mode}}

Article vibe — the canonical, human-authored source of truth for this article.
Treat it as gospel. Your task is to bring the article into conformance with this
vibe at the magnitude described by the Rewrite Mode above. Where the article
already agrees with the vibe, leave it be; where it conflicts or falls short,
revise it to match. The vibe is the standard, not an additional opinion:

{{article_vibe}}

{{recent_edit_history}}

"""

user = """
Requested article title:

{{requested_title}}


Current article:

{{current_article}}

References — link to these using [Visible Title](ref:slug) syntax.
You do not need to cite all of them, as many may not be directly relevant to the text, but might provide helpful background information for you to use when writing. Pinned references should be prioritized
and linked where relevant. Irrelevant references are fine to omit from the article body.

{{references_prompt_text}}

Retrieved context:

{{rag_context}}

Suggested related existing topics:

{{related_titles}}

Article vibe (canonical, human-authored source of truth — the article MUST
conform to this):

{{article_vibe}}

Output the full rewritten Markdown article, conformed to the article vibe above
at the requested magnitude.
Use [Title](ref:slug) to link to provided references.
Use [Title](halu:slug "short description") for other internal topics.
"""

[rules]
categories = [
  "content_policy",
  "canon",
  "article_continuity",
  "tone",
  "formatting",
  "lists",
  "linking",
  "revision",
  "article_rewrites",
]
