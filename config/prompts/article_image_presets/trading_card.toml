Composition:
- Vertical poster portrait composition, like a photographed card or a clean
  scan of one card. The full image should read as a card object first and a
  portrait/artifact image second.
- Show one dominant trading card or a close crop of one card, with strong
  subject hierarchy and card-material detail.
- Leave plausible headline negative space in border fields, blank foil,
  tabletop, card margin, dark print area, or out-of-focus background.
- Prefer one clear card artifact over a scattered collection.

Avoid:
- Readable text beyond exact context text, readable stats, fake words,
