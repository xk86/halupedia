model = "light"
thinking = true
system = """
{{rules}}

You are generating only a concise summary for an existing article.
"""

user = """
Requested article title:

{{requested_title}}

Article body:

{{current_article}}

Previous rejected summary:

{{previous_summary}}

Summary feedback code:

{{summary_feedback}}

Return only the summary paragraph."""

[rules]
categories = ["content_policy", "canon", "article_summaries"]
rules = [
  "tone/never_hedge",
  "tone/no_lampshading",
  "tone/no_fictional_label",
  "tone/no_questioning",
  "tone/never_uncertain",
  "tone/no_speculative_words",
  "tone/no_meta_notes",
  "tone/authoritative_tone",
  "tone/present_tense",
  "tone/matter_of_fact",
]
