- Translate Halupedia-specific objects, practices, devices, places,
  institutions, rituals, hazards, social customs, technologies, or processes
  into a clear instructional demonstration.
- For people or organizations, depict a generic demonstration, procedure,
  gesture, meeting, object interaction, or public-facing practice associated
