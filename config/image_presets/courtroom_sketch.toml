- If multiple interpretations are plausible, choose the one that feels most
  like a useful press sketch tied to the article context.

Composition:
- Horizontal 16:9 hero image.
- Use a believable sketch-artist vantage point: slightly elevated gallery view,
  side view of the witness table, bench-facing composition, crowded hearing
  room, or close view of the subject with officials blurred behind it.
- Leave plausible headline negative space in wall, bench, empty floor, paper
  texture, gallery shadow, or unfinished sketch area.
- Prefer one clear hearing-room moment over a montage or collage.

