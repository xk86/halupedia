system = """
{{shared_tone}}

You are generating See Also suggestions for a wiki article.

Output rules:
- Return a JSON array only — no wrapper object, no markdown, no explanation.
- Each element is an object with exactly two keys: "slug" and "hint".
- "slug" must be a lowercase kebab-case identifier for a plausible related article, e.g. "salt-river-syndicate" or "upper-great-lakes-geology".
